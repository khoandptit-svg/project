<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định dạng font</title>
    <style>
        p{
            font-family:Arial ; /* font chữ */
            font-style: italic; /* kiểu chữ: normal, italic(nghiêng), oblique(xiên) */
            font-weight: bold; /* độ đậm của chữ: normal, bold(đậm), bolder, lighter, 100-900 */
            font-size: 20px; /* kích thước chữ: có thể dùng px, em,vw, rem, % ,1em=16px */
        }
    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Delectus, nesciunt?</p>
    
</body>
</html>
