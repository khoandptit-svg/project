<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sức mạnh Javascript</title>
    <style>
        p{
            color : red;
        }
    </style>
</head>
<body>
    <p id="zent"> Xin chào zent</p>
    <ul>
        <li class="mb">Hà Nội </li>
        <li class="mt">TP.HCM</li>
        <li class="mb">Hải Phòng</li>
    </ul>
    <h4> thẻ h4 - 1 </h4>
    <h4> thẻ h4 - 2 </h4>
    <h4> thẻ h4 - 3 </h4>
    <div id="zent">
        <p>Hello thẻ div </p>
    </div>

    <script>
        document.getElementById("zent").style.color = "red";
        var mb = document.getElementsByClassName("mb");
        mb[0].style.color = "blue";
        var h4 = document.getElementsByTagName("h4");
        h4[2] .style.color = "pink";
        var zent = document.querySelectorAll("#zent p");
        zent[0].style.color = "red";
    </script>
</body>
</html>
